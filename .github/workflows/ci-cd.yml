name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: sathwiiik
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t sathwiiik/wisecow:latest .

      - name: Push image
        run: docker push sathwiiik/wisecow:latest